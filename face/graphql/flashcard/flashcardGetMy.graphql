query Flashcard_get_my($input: GetMyFlashcardsInput!) {
	flashcard_get_my(input: $input) {
		id
		languageCode
		sentenceText
		sentenceTranslation
		phrase
		phraseStartOffset
		phraseEndOffset
		phraseTranslation
		phraseTranscription
		examples {
			text
			translate
		}
		bookPrivateId
		bookPublicId
		videoPrivateId
		videoPublicId
		sentencePhraseTranslationId
		createdAt
	}
}
