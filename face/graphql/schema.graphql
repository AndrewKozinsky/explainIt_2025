type Mutation {
  """Email confirmation"""
  auth_confirmEmail(input: ConfirmEmailInput!): Boolean!

  """User login"""
  auth_login(input: LoginInput!): UserOutModel!

  """User login with OAuth"""
  auth_login_with_OAuth(input: LoginWithOAuthInput!): UserOutModel!

  """Current user logout"""
  auth_logout: Boolean!

  """
  Register a user.
  	Possible errors:
  	**[object Object]** — the user is already registered, but doesn't confirm his email.
  	**[object Object]** — the user is already registered and confirmed his email.
  """
  auth_register(input: RegisterUserInput!): UserOutModel!

  """Resend email confirmation letter"""
  auth_resendConfirmationEmail(input: ResendConfirmationEmailInput!): Boolean!

  """Create book chapter"""
  book_chapter_create(input: CreateBookChapterInput!): BookChapterOutModel!

  """Delete book chapter"""
  book_chapter_delete(input: DeleteBookChapterInput!): Boolean!

  """Update book chapter"""
  book_chapter_update(input: UpdateBookChapterInput!): BookChapterOutModel!

  """Create book"""
  book_create(input: CreatePrivateBookInput!): BookPrivateOutModel!

  """Delete user book"""
  book_delete(input: DeletePrivateBookInput!): Boolean!

  """Update user book"""
  book_update(input: UpdatePrivateBookInput!): BookPrivateOutModel!

  """
  Generate audio pronunciation for a word using Google TTS and store it on S3
  """
  create_audio_pronunciation(input: CreateUniversalAudioPronunciationInput!): UniversalAudioPronunciationOutModel!

  """Create transcription for a word using DeepSeek"""
  create_transcription(input: CreateUniversalTranscriptionInput!): TranscriptionOutModel!

  """
  Добавить фразу из разбора предложения в коллекцию карточек пользователя.
  """
  flashcard_add(input: AddFlashcardInput!): FlashcardOutModel!

  """Удалить карточку пользователя."""
  flashcard_remove(input: RemoveFlashcardInput!): Boolean!

  """Top up balance with YooKassa"""
  payment_yookassa_top_up_balance(input: TopUpBalanceWithYooKassaInput!): CreateYooKassaPaymentOutModel!

  """
  Создать новый пустой тред чата с ИИ для выделенного предложения. Вызывается клиентом перед отправкой первого вопроса, если getSentenceChatThread вернул null. Если тред уже существует — отдаёт ошибку.
  """
  sentence_chat_create_thread(input: CreateSentenceChatThreadInput!): SentenceChatThreadOutModel!

  """
  Добавить пользовательское сообщение (вопрос) в существующий тред. После этого клиент подключается к SSE-стриму /sentence-chat/threads/:threadId/assistant-stream, чтобы сервер сгенерировал и постримил ответ ассистента.
  """
  sentence_chat_create_user_message(input: CreateSentenceChatUserMessageInput!): SentenceChatMessageOutModel!

  """Translate phrase in sentence by selected offsets"""
  translate_translate_phrase(input: TranslatePhraseInput!): SentencePhraseTranslationOutModel!

  """Translate sentence"""
  translate_translate_sentence(input: TranslateSentenceInput!): TranslateSentenceResultOutModel!

  """Create a new phrase"""
  universal_phrase_create(input: CreateUniversalPhraseInput!): UniversalPhraseOutModel!

  """Create a video"""
  video_private_create(input: CreatePrivateVideoInput!): CreateVideoPrivateOutModel!

  """Delete a video"""
  video_private_delete(input: DeletePrivateVideoInput!): Boolean!

  """
  Enqueue automatic subtitles generation (ASR) for a private uploaded video. Requires min balance.
  """
  video_private_generate_subtitles(input: GenerateSubtitlesForPrivateVideoInput!): VideoPrivateSubtitlesStatusOutModel!

  """Update a video"""
  video_private_update(input: UpdatePrivateVideoInput!): UpdateVideoPrivateOutModel!
}

type Query {
  """Get current user data"""
  auth_getMe: UserOutModel!

  """Get book chapter"""
  book_chapter_get(input: GetBookChapterInput!): BookChapterOutModel!

  """Get user book"""
  book_get(input: GetPrivateBookInput!): BookPrivateOutModel!

  """Get public book"""
  book_public_get_book(input: GetBookPublicInput!): BookPublicOutModel!

  """Get public books"""
  book_public_get_books: [BookPublicOutModel!]!

  """Get user books"""
  book_user_books: [BookPrivateOutModel!]!

  """Получить список карточек пользователя. Опционально фильтрует по языку."""
  flashcard_get_my(input: GetMyFlashcardsInput!): [FlashcardOutModel!]!

  """Get all available languages"""
  language_get_languages: [LanguageOutModel!]!

  """
  Получить тред чата с ИИ для выделенного предложения со всеми сообщениями. Если тред ещё не создавался — возвращает null.
  """
  sentence_chat_get_thread(input: GetSentenceChatThreadInput!): SentenceChatThreadOutModel

  """Get existing phrase translation by sentence and offsets"""
  translate_get_phrase_translation(input: GetPhraseTranslationInput!): SentencePhraseTranslationOutModel

  """Get all existing phrase translations by sentence id"""
  translate_get_phrase_translations_by_sentence(input: GetPhraseTranslationsBySentenceInput!): [SentencePhraseTranslationOutModel!]!

  """Get existing sentence translation by sentence id"""
  translate_get_sentence_translation(input: GetSentenceTranslationInput!): TranslateSentenceResultOutModel

  """Get phrase with transcription and audio pronunciations"""
  universal_phrase_get(input: GetUniversalPhraseInput!): UniversalPhraseOutModel!

  """Get a video"""
  video_private_get(input: GetPrivateVideoInput!): VideoPrivateOutModel!

  """
  Poll current status of automatic subtitles generation for a private video.
  """
  video_private_get_subtitles_generation_status(input: VideoPrivateSubtitlesStatusInput!): VideoPrivateSubtitlesStatusOutModel!

  """Get user videos"""
  video_private_user_videos: [VideoPrivateLiteOutModel!]!

  """Get public video"""
  video_public_get(input: GetPublicVideoInput!): VideoPublicOutModel!

  """Get public videos"""
  video_public_get_videos: [VideoPublicLiteOutModel!]!
}

