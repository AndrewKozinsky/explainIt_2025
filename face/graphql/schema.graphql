input LoginInput {
  """User email"""
  email: String!

  """User password"""
  password: String!
}

input LoginWithOAuthInput {
  """Code to get user data from OAuth provider"""
  code: String!

  """Provider type: github, google, yandex"""
  providerType: String!
}

type Mutation {
  """Email confirmation"""
  auth_confirmEmail(input: ConfirmEmailInput!): Boolean!

  """User login"""
  auth_login(input: LoginInput!): UserOutModel!

  """User login with OAuth"""
  auth_login_with_OAuth(input: LoginWithOAuthInput!): UserOutModel!

  """Current user logout"""
  auth_logout: Boolean!

  """
  Register a user.
  	Possible errors:
  	**Почта зарегистрирована, но не подтверждена.** — the user is already registered, but doesn't confirm his email.
  	**Почта уже зарегистрирована.** — the user is already registered and confirmed his email.
  """
  auth_register(input: RegisterUserInput!): UserOutModel!

  """Resend email confirmation letter"""
  auth_resendConfirmationEmail(input: ResendConfirmationEmailInput!): Boolean!

  """Create book chapter"""
  book_chapter_create(input: CreateBookChapterInput!): BookChapterOutModel!

  """Delete book chapter"""
  book_chapter_delete(input: DeleteBookChapterInput!): Boolean!

  """Update book chapter"""
  book_chapter_update(input: UpdateBookChapterInput!): BookChapterOutModel!

  """Create book"""
  book_create(input: CreatePrivateBookInput!): BookPrivateOutModel!

  """Delete user book"""
  book_delete(input: DeletePrivateBookInput!): Boolean!

  """Update user book"""
  book_update(input: UpdatePrivateBookInput!): BookPrivateOutModel!

  """Buy a subscription with YooKassa"""
  payment_yookassa_buy_subscription(input: BuySubscriptionWithYooKassaInput!): BuySubscriptionWithYooKassaOutModel!

  """Create a video"""
  video_private_create(input: CreatePrivateVideoInput!): CreateVideoPrivateOutModel!

  """Delete a video"""
  video_private_delete(input: DeletePrivateVideoInput!): Boolean!

  """Update a video"""
  video_private_update(input: UpdatePrivateVideoInput!): UpdateVideoPrivateOutModel!
}

type Query {
  ai_checkTranslation(input: CheckTranslationInput!): CheckTranslationOutModel!
  ai_getTranscription(input: GetTranscriptionInput!): GetTranscriptionOutModel!

  """Get current user data"""
  auth_getMe: UserOutModel!

  """Get book chapter"""
  book_chapter_get(input: GetBookChapterInput!): BookChapterOutModel!

  """Get user book"""
  book_get(input: GetPrivateBookInput!): BookPrivateOutModel!

  """Get public book"""
  book_public_get_book(input: GetBookPublicInput!): BookPublicOutModel!

  """Get public books"""
  book_public_get_books: [BookPublicOutModel!]!

  """Get user books"""
  book_user_books: [BookPrivateOutModel!]!

  """Get all tariffs"""
  tariff_get_tariffs: [TariffOutModel!]!

  """Get a video"""
  video_private_get(input: GetPrivateVideoInput!): VideoPrivateOutModel!

  """Get user videos"""
  video_private_user_videos: [VideoPrivateLiteOutModel!]!

  """Get public video"""
  video_public_get(input: GetPublicVideoInput!): VideoPublicOutModel!

  """Get public videos"""
  video_public_get_videos: [VideoPublicLiteOutModel!]!
}

