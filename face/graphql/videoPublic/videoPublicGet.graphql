query VideoPublic_get($input: GetPublicVideoInput!) {
	video_public_get(input: $input) {
		id
		name
		year
		languageCode
		note
		covers
		coverBackgroundColor
		originalContent
		processedContent
		contentType
		fileName
		fileS3Key
		fileUrl
		freeToUse
		sentences {
			id
			startOffset
			length
			orderIndex
			sentenceTranslations {
				id
				translation
			}
			sentencePhraseTranslations {
				id
				sentenceId
				phrase
				phraseStartOffset
				phraseEndOffset
				translate
				status
				errorMessage
				createdAt
				updatedAt
				flashcardId
				examples {
					text
					translate
				}
				universalPhrase {
					id
					text
					sourceLanguageCode
					transcription {
						id
						universalPhraseId
						ipa
						pinyin
					}
					audioPronunciation {
						id
						universalPhraseId
						audioUrl
					}
				}
			}
			grammarConcepts {
				id
				title
				slug
				category
				order
				sourceLanguage
				targetLanguage
			}
			missingGrammarConcepts {
				category
				alias
			}
		}
		subtitles {
			id
			startTimeMs
			endTimeMs
			startOffset
			length
			orderIndex
		}
		subtitleSentenceInit {
			id
			subtitleId
			sentenceId
			startOffset
			length
		}
	}
}
