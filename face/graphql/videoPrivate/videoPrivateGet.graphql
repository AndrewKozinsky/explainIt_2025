query VideoPrivate_get($input: GetPrivateVideoInput!) {
	video_private_get(input: $input) {
		id
		name
		year
		languageCode
		originalContent
		processedContent
		contentType
		userId
		fileName
		fileS3Key
		fileUrl
		isFileUploaded
		fileSizeMb
		freeToUse
		sentences {
			id
			sentenceTranslations {
				id
				translation
			}
			startOffset
			length
			orderIndex
			grammarConcepts {
				id
				title
				slug
				category
				lemma
				order
				sourceLanguage
				targetLanguage
			}
			missingGrammarConcepts {
				category
				lemma
			}
		}
		subtitles {
			id
			startTimeMs
			endTimeMs
			startOffset
			length
			orderIndex
		}
		subtitleSentenceInit {
			id
			subtitleId
			sentenceId
			startOffset
			length
		}
	}
}
