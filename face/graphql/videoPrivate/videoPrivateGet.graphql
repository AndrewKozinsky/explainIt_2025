query VideoPrivate_get($input: GetPrivateVideoInput!) {
	video_private_get(input: $input) {
		id
		name
		originalContent
		processedContent
		contentType
		userId
		fileName
		fileS3Key
		fileUrl
		isFileUploaded
		fileSizeMb
		sentences {
			id
			startOffset
			length
			orderIndex
		}
		subtitles {
			id
			startTimeMs
			endTimeMs
			startOffset
			length
			orderIndex
		}
		subtitleSentenceInit {
			id
			subtitleId
			sentenceId
			startOffset
			length
		}
	}
}
