query Translate_get_phrase_translations_by_sentence($input: GetPhraseTranslationsBySentenceInput!) {
	translate_get_phrase_translations_by_sentence(input: $input) {
		id
		sentenceId
		phrase
		phraseStartOffset
		phraseEndOffset
		translate
		examples {
			text
			translate
		}
		status
		errorMessage
		createdAt
		updatedAt
	}
}
