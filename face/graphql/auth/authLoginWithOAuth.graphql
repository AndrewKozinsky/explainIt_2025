mutation Auth_login_with_OAuth($input: LoginWithOAuthInput!) {
	auth_login_with_OAuth(input: $input) {
		id
		email
		isUserConfirmed
		currentSubscription {
			tariffId
			tariffCode
			tariffName
			isPublicMediaIncluded
			isPrivateMediaIncluded
			pricePaid
			balance
			includedFileStorageMb
			startsAt
			endsAt
		}
	}
}
