name: Deploy to the master server (International)
on:
  push:
    branches:
      - _master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_INTL }}

      - name: Deploy to International production server
        run: |
          ssh -o StrictHostKeyChecking=no root@<INTL_SERVER_IP> << 'EOF'
            cd ~/sites/explain

            git checkout master
            git fetch origin master
            git reset --hard origin/master

            # Generate .env file
            echo "${{ secrets.ENV_FILE_MASTER }}" > docker/.env.servermaster

            # Copy env file to server folder because it needs for migrations
            cp docker/.env.servermaster server/.env

            # Copy env file to face folder because it needs for getting oauth client id
            cp docker/.env.servermaster face/.env

            docker compose -f docker/docker-compose.server.master.intl.yml --project-directory . --env-file docker/.env.servermaster down
            docker compose -f docker/docker-compose.server.master.intl.yml --project-directory . --env-file docker/.env.servermaster up --build -d
          EOF
